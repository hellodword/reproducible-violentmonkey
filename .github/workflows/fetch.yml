name: Check updates

on:
  push:
    branches:
      - 'master'
  workflow_dispatch:
  schedule:
    - cron: "30 0,12 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: 'master'
          fetch-depth: 0

      - name: Install Nix with official installer
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y xz-utils

          curl -L https://nixos.org/nix/install | sh -s -- --daemon

          echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"
          echo "NIX_REMOTE=daemon" >> "$GITHUB_ENV"

          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh

          nix --version

      - name: Configure Nix
        shell: bash
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          sudo sed -i \
            -e '/^experimental-features[[:space:]]*=/d' \
            -e '/^max-jobs[[:space:]]*=/d' \
            -e '/^trusted-users[[:space:]]*=/d' \
            -e '/^access-tokens[[:space:]]*=/d' \
            /etc/nix/nix.conf

          printf '%s\n' \
            "experimental-features = nix-command flakes" \
            "max-jobs = auto" \
            "trusted-users = root ${USER}" \
            "access-tokens = github.com=$GITHUB_ACCESS_TOKEN" \
            | sudo tee -a /etc/nix/nix.conf

          sudo systemctl restart nix-daemon

          nix config show experimental-features
          nix config show substituters

      - name: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          version_ori="$(find releases/violentmonkey -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -V | tail -n1)"
          if [ -z "$version_ori" ]; then
            echo "failed to detect recorded version" >&2
            exit 1
          fi

          version_new="$(nix run .#latest | tail -n1)"
          if [ -z "$version_new" ]; then
            echo "failed to detect latest version" >&2
            exit 1
          fi

          echo "recorded version: $version_ori" >> "$GITHUB_STEP_SUMMARY"
          echo "latest version: $version_new" >> "$GITHUB_STEP_SUMMARY"

          nix run .#update -- "$version_new"
          nix run .#verify -- "$version_new"

          if [ "$version_new" != "$version_ori" ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat "releases/violentmonkey/$version_new/release.json" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add "releases/violentmonkey/$version_new"
            git commit -m "chore: [bot] $version_ori -> $version_new"
            git checkout -b "automated/${version_ori}_to_${version_new}"
            git push -f origin "automated/${version_ori}_to_${version_new}"
            PR_URL="$(gh pr create --fill)"
            gh pr merge "$PR_URL" --delete-branch --rebase
          fi
